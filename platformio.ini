[platformio]
extra_configs = secrets.ini
default_envs = esp32-wroom-32e-dev

; ============================================
;  ENV COMMUN À TOUS LES ESP32
;  (s'applique à TOUTES les sections [env:...])
; ============================================
[env]
upload_speed  = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
 
board_upload.flash_size = 8MB
board_build.partitions  = partitions.csv

build_flags =
  -Os
  -ffunction-sections
  -fdata-sections
  -Wl,--gc-sections
  -DCORE_DEBUG_LEVEL=0
  -DFORCE_DEVKEY_FROM_BUILD=1
  -DHAVE_MQTT_CLIENT_CERT
  -D FACTORY_RESET_ON_FLASH=0
  ; --- PATCH: forcer l’include des libs Network ---
  -I"$PROJECT_PACKAGES_DIR/framework-arduinoespressif32/libraries/Network/src"
  -I"$PROJECT_PACKAGES_DIR/framework-arduinoespressif32/libraries/Networking/src"
  -I"$PROJECT_PACKAGES_DIR/framework-arduinoespressif32/libraries/NetworkClientSecure/src"

build_unflags = -flto
lib_ldf_mode = deep+

monitor_rts = 0
monitor_dtr = 0

lib_deps =
  h2zero/NimBLE-Arduino@2.3.6
  bblanchon/ArduinoJson@^6.21.3
  adafruit/Adafruit AHTX0@^2.0.5
  adafruit/Adafruit NeoPixel@^1.12.3
  knolleary/PubSubClient@^2.8
  https://github.com/adafruit/ENS160_driver

extra_scripts =
  pre:scripts/pre_build_devkey.py
  pre:scripts/pre_build_flashsig.py
  pre:scripts/pre_build_mqtt_secrets.py
  post:scripts/post_upload_register.py

board_build.embed_txtfiles =
  src/certs/ca_rezoleo.pem
  src/certs/hivemq_ca.pem

; ⚠️ commun aux deux (clé d’usine + device key)
; custom_device_key_b64 et custom_factory_token : secrets.ini ou env (DEVICE_KEY_B64, FACTORY_TOKEN)

; ============================================
;  ENV  DEV
; ============================================
[env:esp32-wroom-32e-dev]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.11/platform-espressif32.zip
board = esp32dev
framework = arduino

; utilisé par post_upload_register.py
custom_api_url = https://breezly-backendweb.onrender.com

build_flags =
  ${env.build_flags}
  -DBREEZLY_DEV
  -DBREEZLY_LOG_LEVEL=4

; ============================================
;  ENV  PROD
; ============================================
[env:esp32-wroom-32e-prod]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.11/platform-espressif32.zip
board = esp32dev
framework = arduino

; Clé device : héritée de secrets.ini [env] ou variable d'environnement DEVICE_KEY_B64

custom_api_url = https://breezly-backend.onrender.com

build_flags =
  ${env.build_flags}
  -DBREEZLY_PROD
  -DBREEZLY_LOG_LEVEL=4

; Env dédié test rollback OTA : simule 3 boots en échec puis rollback (voir DOCUMENTATION.md)
[env:esp32-wroom-32e-prod-rollback-test]
platform = ${env:esp32-wroom-32e-prod.platform}
board = ${env:esp32-wroom-32e-prod.board}
framework = ${env:esp32-wroom-32e-prod.framework}
custom_api_url = ${env:esp32-wroom-32e-prod.custom_api_url}
build_flags =
  ${env:esp32-wroom-32e-prod.build_flags}
  -DOTA_TEST_ROLLBACK_SIMULATE_CRASH

; Simulation backoff au boot : imprime la séquence des délais (1s, 2s, 4s... cap 5min)
[env:esp32-wroom-32e-prod-backoff-sim]
platform = ${env:esp32-wroom-32e-prod.platform}
board = ${env:esp32-wroom-32e-prod.board}
framework = ${env:esp32-wroom-32e-prod.framework}
custom_api_url = ${env:esp32-wroom-32e-prod.custom_api_url}
build_flags =
  ${env:esp32-wroom-32e-prod.build_flags}
  -DBACKOFF_SIM_TEST
